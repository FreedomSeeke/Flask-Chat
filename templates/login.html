<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudTalk - 登录</title>
    <link rel="icon" href="{{ url_for('static', filename='images/香香的熏.jpg') }}" type="image/x-icon">
    <style>
        /* 视频背景样式 */
        .video-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vw;
    height: 100vh;
    transform: translate(-50%, -50%) scale(1.1);
    object-fit: cover;
    z-index: -100;
}

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 撑满屏幕 */
            font-family: "Microsoft YaHei", sans-serif;
            /* 备选背景色，防止视频加载慢时纯白刺眼 */
            background-color: #000; 
        }

        .login-box {
            position: relative; /* 确保在视频上方 */
            z-index: 1;
            width: 350px;
            padding: 30px;
            /* 使用半透明白色背景，让视频隐约可见，更有质感 */
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-item {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #07C160;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #06b058;
        }

        .register-link {
            margin-top: 15px;
        }

        a {
            color: #1677ff;
            text-decoration: none;
        }

        .error {
            color: #ff3b30;
            margin-bottom: 15px;
            padding: 8px;
            background: #fff2f0;
            border-radius: 5px;
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .login-box {
                width: 90%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

   <video id="bgVideo" class="video-bg" autoplay loop muted playsinline>
    <source src="{{ url_for('static', filename='video/银河系.mp4') }}" type="video/mp4">
</video>

    <div class="login-box">
        <img src="{{ url_for('static', filename='images/flow.jpg') }}" class="logo-img" alt="Logo">
        <h2>欢迎登录CloudTalk</h2>
        
        {% if error %}
            <div class="error" id="errorMessage">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="form-item">
                <input type="text" name="username" placeholder="用户名" required>
            </div>
            <div class="form-item">
                <input type="password" name="password" placeholder="密码" required>
            </div>
            {% if show_verify %}
                <div class="form-item">
                    <div class="verify-code-tip">验证码：{{ verify_code }}</div>
                    <input type="text" name="verify_code" placeholder="请输入4位验证码" required maxlength="4">
                </div>
            {% endif %}
            <button type="submit">登录</button>
        </form>

        <div class="register-link">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>

</body>
<script>
    const video = document.getElementById('bgVideo');
    video.playbackRate = 1; // 0.5倍速（慢一点）

    // 账号锁定时的实时跳秒功能
    {% if lock_end_time and locked_username %}
    document.addEventListener('DOMContentLoaded', function() {
        const errorMessage = document.getElementById('errorMessage');
        const lockEndTime = {{ lock_end_time }};
        const lockedUsername = {{ locked_username|tojson }};
        const usernameInput = document.querySelector('input[name="username"]');
        const submitButton = document.querySelector('button[type="submit"]');
        
        function updateButtonState() {
            const currentUsername = usernameInput.value.trim();
            const now = Date.now() / 1000;
            const remainTime = Math.max(0, Math.floor(lockEndTime - now));
            
            if (remainTime > 0 && currentUsername === lockedUsername) {
                // 只有当前输入的用户名与被锁定的用户名一致时，才禁用按钮
                submitButton.disabled = true;
                submitButton.style.backgroundColor = '#ccc';
                submitButton.style.cursor = 'not-allowed';
            } else {
                // 其他情况启用按钮
                submitButton.disabled = false;
                submitButton.style.backgroundColor = '#07C160';
                submitButton.style.cursor = 'pointer';
            }
        }
        
        function updateCountdown() {
            const now = Date.now() / 1000;
            const remainTime = Math.max(0, Math.floor(lockEndTime - now));
            
            if (remainTime > 0) {
                const currentUsername = usernameInput.value.trim();
                // 只在输入的是被锁定的用户名时显示倒计时
                if (currentUsername === lockedUsername) {
                    errorMessage.textContent = `账号已锁定，请${remainTime}秒后重试`;
                } else {
                    // 如果输入的是其他用户名，清除错误信息
                    errorMessage.textContent = '';
                }
                setTimeout(updateCountdown, 1000);
            } else {
                errorMessage.textContent = '';
            }
            
            updateButtonState();
        }
        
        // 监听用户名输入框的变化
        usernameInput.addEventListener('input', function() {
            updateButtonState();
            // 当用户名改变时，更新倒计时显示
            updateCountdown();
        });
        
        // 页面加载时，确保按钮初始状态是启用的
        submitButton.disabled = false;
        submitButton.style.backgroundColor = '#07C160';
        submitButton.style.cursor = 'pointer';
        
        // 开始倒计时
        updateCountdown();
    });
    {% endif %}
</script>
</html>
